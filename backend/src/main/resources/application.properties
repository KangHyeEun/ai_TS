# Server
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/toeic_speaking?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
upload.path=uploads

# Gemini API (콤마로 여러 키 등록 가능: KEY1,KEY2,KEY3)
gemini.api.keys=${GEMINI_API_KEYS:${GEMINI_API_KEY}}
gemini.api.model=gemini-2.5-flash
